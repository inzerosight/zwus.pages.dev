<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Zero Width Unicode Standard</title>
    <link rel="preconnect" href="https://fonts.bunny.net">
    <link href="https://fonts.bunny.net/css?family=inter:700,900" rel="stylesheet" />
    <style>
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        body, html {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background-color: #ffffff;
            color: #000000;
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }
        h1 {
            font-size: 2.5rem;
            font-weight: 900;
            line-height: 1.1;
            margin: 0 0 3rem 0;
            padding: 0 1.5rem;
            max-width: 600px;
        }
        .btn-group {
            display: flex;
            gap: 1rem;
            margin-bottom: 2.5rem;
            flex-wrap: wrap;
            justify-content: center;
        }
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 0.6rem;
            justify-content: center;
            background-color: #000000;
            color: #ffffff;
            text-decoration: none;
            padding: 1rem 2.5rem;
            border-radius: 9999px;
            font-weight: 700;
            font-size: 1.1rem;
            transition: transform 0.1s ease;
        }
        .btn:active {
            transform: scale(0.95);
        }
        .btn.rust {
            background-color: #ce412b;
        }
        .btn img {
            width: 22px;
            height: 22px;
        }
        .extensions {
            display: flex;
            gap: 1.5rem;
            margin-bottom: 2.5rem;
            flex-wrap: wrap;
            justify-content: center;
        }
        .ext-link {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            text-decoration: none;
            color: #000000;
            font-weight: 700;
            font-size: 1rem;
            padding: 0.6rem 1.5rem;
            border: 2px solid #000000;
            border-radius: 9999px;
            transition: transform 0.1s ease, background-color 0.15s ease, color 0.15s ease;
        }
        .ext-link:hover {
            background-color: #000000;
            color: #ffffff;
        }
        .ext-link:active {
            transform: scale(0.95);
        }
        .ext-link img {
            width: 22px;
            height: 22px;
        }
        .playground {
            display: flex;
            flex-direction: column;
            align-items: center;
            font-weight: 700;
            font-size: 1rem;
        }
        .playground img {
            width: 40px;
            height: 40px;
            margin-bottom: 0.75rem;
            border-radius: 8px;
        }
        .playground p {
            margin: 0;
        }
        .playground a {
            color: #000000;
            text-decoration: underline;
            text-underline-offset: 4px;
        }

        @media (max-width: 400px) {
            h1 { font-size: 2.2rem; }
            .btn { padding: 0.8rem 2rem; font-size: 1rem; }
            .btn-group { gap: 0.5rem; }
            .extensions { gap: 0.75rem; }
            .ext-link { padding: 0.5rem 1.2rem; font-size: 0.9rem; }
        }
    </style>
</head>
<body>

    <h1>Zero Width Unicode Standard</h1>

    <div class="btn-group">
        <a href="https://www.npmjs.com/package/zwus" target="_blank" rel="noopener noreferrer" class="btn">
            <img src="assets/npm-logo-black.svg" alt="npm"> npm package
        </a>
        <a href="https://crates.io/crates/zwus" target="_blank" rel="noopener noreferrer" class="btn rust">
            <img src="assets/Cargo-Logo-Small.png" alt="Cargo"> rust crate
        </a>
    </div>

    <div class="extensions">
        <a href="https://addons.mozilla.org/en-US/firefox/addon/in0sight/" target="_blank" rel="noopener noreferrer" class="ext-link">
            <img src="assets/Firefox_logo,_2019.svg" alt="Firefox"> Firefox Add-on
        </a>
        <a href="https://chromewebstore.google.com/detail/acnmohbphjmnbaboacmecidopeplkhog" target="_blank" rel="noopener noreferrer" class="ext-link">
            <img src="assets/Google_Chrome_icon_(February_2022).svg.png" alt="Chrome"> Chrome Extension
        </a>
    </div>

    <div class="playground">
        <img src="https://raw.githubusercontent.com/planetrenox/inzerosight/main/icon_128.png" alt="inØsight logo">
        <p>playground: <a href="https://inzerosight.pages.dev" target="_blank" rel="noopener noreferrer">inzerosight.pages.dev</a></p>
    </div>

</body>
</html>
