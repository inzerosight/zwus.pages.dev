<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Zero Width Unicode Standard</title>
    <link rel="preconnect" href="https://fonts.bunny.net">
    <link href="https://fonts.bunny.net/css?family=inter:700,900" rel="stylesheet" />
    <style>
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        body, html {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            overflow: hidden; /* No scroll */
            background-color: #ffffff;
            color: #000000;
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }
        h1 {
            font-size: 2.5rem;
            font-weight: 900;
            line-height: 1.1;
            margin: 0 0 3rem 0;
            padding: 0 1.5rem;
            max-width: 600px;
        }
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background-color: #000000;
            color: #ffffff;
            text-decoration: none;
            padding: 1rem 2.5rem;
            border-radius: 9999px; /* Fully round */
            font-weight: 700;
            font-size: 1.1rem;
            margin-bottom: 4rem;
            transition: transform 0.1s ease;
        }
        .btn:active {
            transform: scale(0.95);
        }
        .playground {
            display: flex;
            flex-direction: column;
            align-items: center;
            font-weight: 700;
            font-size: 1rem;
        }
        .playground img {
            width: 40px;
            height: 40px;
            margin-bottom: 0.75rem;
            border-radius: 8px; /* Smooth out the icon edges a bit */
        }
        .playground p {
            margin: 0;
        }
        .playground a {
            color: #000000;
            text-decoration: underline;
            text-underline-offset: 4px;
        }
        
        @media (max-width: 400px) {
            h1 { font-size: 2.2rem; }
            .btn { padding: 0.8rem 2rem; font-size: 1rem; }
        }
    </style>
</head>
<body>

    <h1>Zero Width Unicode Standard</h1>
    
    <a href="https://www.npmjs.com/package/zwus" target="_blank" rel="noopener noreferrer" class="btn">
        npm package
    </a>

    <div class="playground">
        <img src="https://raw.githubusercontent.com/planetrenox/inzerosight/main/icon_128.png" alt="inØsight logo">
        <p>playground: <a href="https://inzerosight.pages.dev" target="_blank" rel="noopener noreferrer">inzerosight.pages.dev</a></p>
    </div>

</body>
</html>
